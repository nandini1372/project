<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<h1> Puppy Adoption Page</h1>
<h2>Please enter your information to adopt a puppy and we'll email you back</h2>
<form method="get">
    <p>Please Note: First Name,Last Name,Password, and Email are required</p>
   
     <label for="fname">First Name:</label>
    <input type="text" id="fname" placeholder="First Name">
    <label for="lname">Last Name:</label>
    <input type="text" id="lname" placeholder="Last Name">
    <br>
    <br>
    <label for="email">Email:</label>
    <input type="text" id="email" placeholder="name@email.com">
    <label for="password">Password:</label>
    <input type="password" id="password">
<br>
<p>Are you over the age of 18?</p>
<input type="radio" id="yes" name="age" value="yes">
<label for="yes">Yes</label>
<input type="radio" id="no" name="age" value="no">
<label for="no">No</label>
<br>
<p>Do you have a Credit Card or Pay Pal?</p>
<select name="card" id="Card">
    <option value="Credit Card">Credit Card</option>
    <option value="Pay Pal">Pay Pal</option>
</select>
<br>
<br>
<input type="submit" value="Submit Feedback">
</form>
</body
</html>
